x-project-template-environment: &project-template-environment
  PROJECT_TEMPLATE_ENV: ${PROJECT_TEMPLATE_ENV:-local}
  PROJECT_TEMPLATE_SERVICE_NAME: ${PROJECT_TEMPLATE_SERVICE_NAME:-project-template-controller}
  PROJECT_TEMPLATE_VERSION: ${PROJECT_TEMPLATE_VERSION:-local}
  PROJECT_TEMPLATE_HTTP_ADDR: ":8080"
  PROJECT_TEMPLATE_DATABASE_URL: postgres://project_template:${PROJECT_TEMPLATE_DATABASE_PASSWORD:?set PROJECT_TEMPLATE_DATABASE_PASSWORD}@postgres:5432/project_template?sslmode=disable
  PROJECT_TEMPLATE_LOG_LEVEL: ${PROJECT_TEMPLATE_LOG_LEVEL:-info}
  PROJECT_TEMPLATE_SESSION_HASH_KEY: ${PROJECT_TEMPLATE_SESSION_HASH_KEY:?set PROJECT_TEMPLATE_SESSION_HASH_KEY}
  PROJECT_TEMPLATE_SESSION_COOKIE_NAME: ${PROJECT_TEMPLATE_SESSION_COOKIE_NAME:-project_template_session}
  PROJECT_TEMPLATE_SESSION_COOKIE_SECURE: ${PROJECT_TEMPLATE_SESSION_COOKIE_SECURE:-false}
  PROJECT_TEMPLATE_SESSION_IDLE_TTL: ${PROJECT_TEMPLATE_SESSION_IDLE_TTL:-12h}
  PROJECT_TEMPLATE_SESSION_ABSOLUTE_TTL: ${PROJECT_TEMPLATE_SESSION_ABSOLUTE_TTL:-168h}
  PROJECT_TEMPLATE_CSRF_ALLOWED_ORIGINS: ${PROJECT_TEMPLATE_CSRF_ALLOWED_ORIGINS:-http://localhost:3000}
  PROJECT_TEMPLATE_REQUEST_TIMEOUT: ${PROJECT_TEMPLATE_REQUEST_TIMEOUT:-15s}
  PROJECT_TEMPLATE_SHUTDOWN_TIMEOUT: ${PROJECT_TEMPLATE_SHUTDOWN_TIMEOUT:-10s}
  PROJECT_TEMPLATE_OTEL_TRACES_ENDPOINT: ${PROJECT_TEMPLATE_OTEL_TRACES_ENDPOINT:-}
  PROJECT_TEMPLATE_WEB_DIR: /app/web

services:
  postgres:
    image: postgres:17.6-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: project_template
      POSTGRES_USER: project_template
      POSTGRES_PASSWORD: ${PROJECT_TEMPLATE_DATABASE_PASSWORD:?set PROJECT_TEMPLATE_DATABASE_PASSWORD}
    volumes:
      - project-template-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U project_template -d project_template"]
      interval: 5s
      timeout: 5s
      retries: 12

  migrate:
    image: ${PROJECT_TEMPLATE_IMAGE:-project-template}:${PROJECT_TEMPLATE_VERSION:-local}
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment: *project-template-environment
    entrypoint: ["/app/migrate"]
    command: ["-command", "up", "-dir", "/app/db/migrations"]

  app:
    image: ${PROJECT_TEMPLATE_IMAGE:-project-template}:${PROJECT_TEMPLATE_VERSION:-local}
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment: *project-template-environment
    ports:
      - "${PROJECT_TEMPLATE_PORT:-3000}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/api/v1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 12

volumes:
  project-template-postgres:
