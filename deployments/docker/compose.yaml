x-sitcon-board-environment: &sitcon-board-environment
  SITCON_BOARD_ENV: ${SITCON_BOARD_ENV:-local}
  SITCON_BOARD_SERVICE_NAME: ${SITCON_BOARD_SERVICE_NAME:-sitcon-board-controller}
  SITCON_BOARD_VERSION: ${SITCON_BOARD_VERSION:-local}
  SITCON_BOARD_HTTP_ADDR: ":8080"
  SITCON_BOARD_DATABASE_URL: postgres://sitcon_board:${SITCON_BOARD_DATABASE_PASSWORD:?set SITCON_BOARD_DATABASE_PASSWORD}@postgres:5432/sitcon_board?sslmode=disable
  SITCON_BOARD_LOG_LEVEL: ${SITCON_BOARD_LOG_LEVEL:-info}
  SITCON_BOARD_SESSION_HASH_KEY: ${SITCON_BOARD_SESSION_HASH_KEY:?set SITCON_BOARD_SESSION_HASH_KEY}
  SITCON_BOARD_OAUTH_STATE_CIPHER_KEY: ${SITCON_BOARD_OAUTH_STATE_CIPHER_KEY:?set SITCON_BOARD_OAUTH_STATE_CIPHER_KEY}
  SITCON_BOARD_SESSION_COOKIE_SECURE: ${SITCON_BOARD_SESSION_COOKIE_SECURE:-false}
  SITCON_BOARD_GITLAB_BASE_URL: ${SITCON_BOARD_GITLAB_BASE_URL:-https://gitlab.com}
  SITCON_BOARD_GITLAB_CLIENT_ID: ${SITCON_BOARD_GITLAB_CLIENT_ID:?set SITCON_BOARD_GITLAB_CLIENT_ID}
  SITCON_BOARD_GITLAB_CLIENT_SECRET: ${SITCON_BOARD_GITLAB_CLIENT_SECRET:?set SITCON_BOARD_GITLAB_CLIENT_SECRET}
  SITCON_BOARD_GITLAB_OAUTH_REDIRECT_URL: ${SITCON_BOARD_GITLAB_OAUTH_REDIRECT_URL:-http://localhost:3000/api/v1/auth/gitlab/callback}
  SITCON_BOARD_GITLAB_PROJECT_ACCESS_TOKEN: ${SITCON_BOARD_GITLAB_PROJECT_ACCESS_TOKEN:?set SITCON_BOARD_GITLAB_PROJECT_ACCESS_TOKEN}
  SITCON_BOARD_GITHUB_API_URL: ${SITCON_BOARD_GITHUB_API_URL:-https://api.github.com}
  SITCON_BOARD_GITHUB_REF: ${SITCON_BOARD_GITHUB_REF:-main}
  SITCON_BOARD_GITHUB_TOKEN: ${SITCON_BOARD_GITHUB_TOKEN:-}
  SITCON_BOARD_CSRF_ALLOWED_ORIGINS: ${SITCON_BOARD_CSRF_ALLOWED_ORIGINS:-http://localhost:3000}
  SITCON_BOARD_REQUEST_TIMEOUT: ${SITCON_BOARD_REQUEST_TIMEOUT:-15s}
  SITCON_BOARD_SHUTDOWN_TIMEOUT: ${SITCON_BOARD_SHUTDOWN_TIMEOUT:-10s}
  SITCON_BOARD_OTEL_TRACES_ENDPOINT: ${SITCON_BOARD_OTEL_TRACES_ENDPOINT:-}
  SITCON_BOARD_WEB_DIR: /app/web

services:
  postgres:
    image: postgres:17.6-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sitcon_board
      POSTGRES_USER: sitcon_board
      POSTGRES_PASSWORD: ${SITCON_BOARD_DATABASE_PASSWORD:?set SITCON_BOARD_DATABASE_PASSWORD}
    volumes:
      - sitcon-board-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sitcon_board -d sitcon_board"]
      interval: 5s
      timeout: 5s
      retries: 12

  migrate:
    image: ${SITCON_BOARD_IMAGE:-sitcon-board}:${SITCON_BOARD_VERSION:-local}
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment: *sitcon-board-environment
    entrypoint: ["/app/migrate"]
    command: ["-command", "up", "-dir", "/app/db/migrations"]

  app:
    image: ${SITCON_BOARD_IMAGE:-sitcon-board}:${SITCON_BOARD_VERSION:-local}
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment: *sitcon-board-environment
    ports:
      - "${SITCON_BOARD_PORT:-3000}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/api/v1/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 12

volumes:
  sitcon-board-postgres:
